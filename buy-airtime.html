<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buy Airtime — BUMI Network</title>
<link rel="stylesheet" href="design-system.css">
<style>
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 14px}
.tb-back{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--n-shadow);transition:all .2s}
.tb-back:active{box-shadow:var(--n-shadow-in)}
.tb-title{font-size:18px;font-weight:800;color:var(--txt);font-family:'Clash Display',sans-serif}

.net-row{display:flex;gap:10px;padding:0 18px 20px;overflow-x:auto;scrollbar-width:none}
.net-row::-webkit-scrollbar{display:none}
.net-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;min-width:64px;padding:6px 4px;border-radius:16px;transition:all .2s}
.net-item:active{transform:scale(0.95)}
.net-logo{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--n-shadow);transition:all .2s}
.net-item.sel .net-logo{box-shadow:0 0 0 3px var(--b5),var(--n-shadow)}
.net-item.sel{background:rgba(74,93,245,.08)}
.net-lbl{font-size:11px;color:var(--txt2);font-weight:600}
.net-item.sel .net-lbl{color:var(--b5);font-weight:800}
.mtn-bg{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.glo-bg{background:linear-gradient(135deg,#22c55e,#15803d)}
.air-bg{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.nin-bg{background:linear-gradient(135deg,#1e2030,#343868)}

.pi-card{margin:0 16px 18px;background:var(--bg);border-radius:var(--r-md);padding:16px;box-shadow:var(--n-shadow);border:1px solid rgba(255,255,255,.4)}
.pi-lbl{font-size:13px;font-weight:800;color:var(--txt);margin-bottom:10px}
.pi-row{display:flex;align-items:center;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--n-shadow-in);background:var(--bg)}
.pi-cc{display:flex;align-items:center;gap:5px;padding:13px 10px;border-right:1.5px solid var(--border);background:rgba(255,255,255,.3);cursor:pointer;white-space:nowrap;font-size:13px;font-weight:700;color:var(--txt)}
.pi-flag{font-size:17px}
.pi-input{flex:1;padding:13px 10px;font-size:14px;color:var(--txt);border:none;outline:none;background:transparent;font-family:inherit;font-weight:600}
.pi-input::placeholder{color:var(--txt3);font-weight:500}

.amt-title{font-size:13px;font-weight:800;color:var(--txt);margin:0 20px 10px;font-family:'Clash Display',sans-serif}
.qamts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px 18px}
.qamt{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 4px;text-align:center;font-size:13px;font-weight:700;color:var(--txt);cursor:pointer;transition:all .15s;box-shadow:var(--n-shadow-sm)}
.qamt.sel,.qamt:hover{border-color:var(--b5);color:var(--b5);background:var(--lightblue);box-shadow:0 0 0 2px var(--b5),var(--n-shadow-sm)}
.qamt:active{box-shadow:var(--n-shadow-in)}

.custom-amt{margin:0 16px 20px}
.custom-amt label{font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px;display:block}

.pay-btn{margin:0 16px 30px}
</style>
</head>
<body>
<div class="app-wrap">

<div class="screen active">
  <div class="sb">
    <span class="sb-time">9:41</span>
    <div class="sb-right">
      <div class="bars"><b></b><b></b><b></b><b></b></div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2"><path d="M1.42 9a16 16 0 0 1 21.16 0M5 12.55a11 11 0 0 1 14.08 0M10.54 16.1a6 6 0 0 1 2.92 0M12 20h.01"/></svg>
      <svg width="24" height="13" viewBox="0 0 28 14"><rect x="1" y="1" width="22" height="12" rx="3" fill="none" stroke="#111827" stroke-width="1.5"/><rect x="3" y="3" width="16" height="8" rx="1.5" fill="#111827"/><path d="M24 4.5v5a2 2 0 0 0 0-5z" fill="#111827"/></svg>
    </div>
  </div>
  <div class="sc">
    <div class="topbar">
      <div class="tb-back" onclick="location.href='home.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></div>
      <span class="tb-title">Buy Airtime</span>
      <div style="width:40px"></div>
    </div>

    <div class="sh"><span class="sh-title">Choose Network</span></div>
    <div class="net-row">
      <div class="net-item sel" onclick="selNet(this)">
        <div class="net-logo mtn-bg"><span style="font-size:13px;font-weight:900;color:#000">MTN</span></div>
        <span class="net-lbl">MTN</span>
      </div>
      <div class="net-item" onclick="selNet(this)">
        <div class="net-logo glo-bg"><span style="font-size:14px;font-weight:900;color:#fff;font-style:italic">glo</span></div>
        <span class="net-lbl">Glo</span>
      </div>
      <div class="net-item" onclick="selNet(this)">
        <div class="net-logo air-bg">
          <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
            <path d="M20 6 C10 6 4 14 4 22 C4 30 10 36 20 36 C30 36 36 30 36 22 C36 14 30 6 20 6 Z" fill="rgba(255,255,255,.15)"/>
            <path d="M12 28 Q20 8 28 28" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <path d="M15 22 Q20 18 25 22" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="net-lbl">Airtel</span>
      </div>
      <div class="net-item" onclick="selNet(this)">
        <div class="net-logo nin-bg"><span style="font-size:20px;font-weight:900;color:#fbbf24">9</span></div>
        <span class="net-lbl">9mobile</span>
      </div>
    </div>

    <div class="pi-card">
      <div class="pi-lbl">Enter Phone Number</div>
      <div class="pi-row">
        <div class="pi-cc"><span class="pi-flag">🇳🇬</span><span>+234</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>
        <input class="pi-input" type="tel" placeholder="801 234 5678">
        <div class="pi-ic" style="padding:0 13px;color:var(--b5);display:flex"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      </div>
    </div>

    <div class="amt-title">Quick Amounts</div>
    <div class="qamts">
      <div class="qamt" onclick="selAmt(this)">₦100</div>
      <div class="qamt" onclick="selAmt(this)">₦200</div>
      <div class="qamt sel" onclick="selAmt(this)">₦500</div>
      <div class="qamt" onclick="selAmt(this)">₦1,000</div>
      <div class="qamt" onclick="selAmt(this)">₦2,000</div>
      <div class="qamt" onclick="selAmt(this)">₦3,000</div>
      <div class="qamt" onclick="selAmt(this)">₦5,000</div>
      <div class="qamt" onclick="selAmt(this)">₦10,000</div>
    </div>

    <div class="custom-amt">
      <label>Or Enter Custom Amount</label>
      <div style="position:relative">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-weight:800;color:var(--txt2)">₦</span>
        <input type="number" class="n-input" placeholder="0.00" style="padding-left:32px">
      </div>
    </div>

    <button class="btn-primary pay-btn w-full" onclick="this.textContent='Processing...';setTimeout(()=>{this.textContent='✓ Airtime Sent!';this.style.background='var(--green)'},1500)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Buy Airtime ₦500
    </button>
  </div>

  <div class="nav">
    <div class="ni" onclick="location.href='home.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><polyline points="9 21 9 12 15 12 15 21"/></svg><span class="ni-lbl">Home</span></div>
    <div class="ni" onclick="location.href='buy-data.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="ni-lbl">Buy Data</span></div>
    <div class="ncb" onclick="location.href='wallet.html'"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></div>
    <div class="ni" onclick="location.href='history.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="ni-lbl">History</span></div>
    <div class="ni" onclick="location.href='profile.html'"><svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="ni-lbl">Profile</span></div>
  </div>
</div>

<script>
function selNet(el){
  el.closest('.net-row').querySelectorAll('.net-item').forEach(n=>n.classList.remove('sel'));
  el.classList.add('sel');
}
function selAmt(el){
  el.closest('.qamts').querySelectorAll('.qamt').forEach(a=>a.classList.remove('sel'));
  el.classList.add('sel');
}
</script>
</body>
</html>
