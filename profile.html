<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profile — BUMI Network</title>
<link rel="stylesheet" href="design-system.css">
<style>
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 14px}
.tb-title{font-size:18px;font-weight:800;color:var(--txt);font-family:'Clash Display',sans-serif}
.tb-icon{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--n-shadow)}

/* Profile Banner */
.prof-banner{margin:0 16px 12px;border-radius:var(--r-lg);background:linear-gradient(130deg,var(--b2),var(--b6));padding:22px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;min-height:110px;box-shadow:0 12px 36px rgba(42,56,200,.25)}
.prof-banner::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
.prof-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.prof-name{font-size:18px;font-weight:900;color:#fff;font-family:'Clash Display',sans-serif}
.prof-ph{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:500}
.prof-ver{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:11px;color:#fff;font-weight:700;margin-top:8px;backdrop-filter:blur(8px)}
.prof-ver svg{width:12px;height:12px}

/* Stats Row */
.prof-stats{display:flex;gap:10px;padding:0 16px 18px}
.pstat{flex:1;background:var(--bg);border-radius:var(--r-md);padding:14px;box-shadow:var(--n-shadow);border:1px solid rgba(255,255,255,.4);text-align:center}
.pstat-val{font-size:18px;font-weight:900;color:var(--txt);font-family:'Clash Display',sans-serif}
.pstat-lbl{font-size:10px;color:var(--txt2);margin-top:4px;font-weight:600}

/* Referral Card */
.ref-card{margin:0 16px 18px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--r-md);padding:16px;box-shadow:var(--n-shadow);border:1px solid rgba(245,158,11,.2)}
.ref-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ref-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--amber),#d97706);display:flex;align-items:center;justify-content:center}
.ref-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.ref-head h3{font-size:14px;font-weight:800;color:var(--txt);font-family:'Clash Display',sans-serif}
.ref-code{display:flex;gap:8px}
.ref-code input{flex:1;text-align:center;font-size:14px;font-weight:800;color:var(--txt);letter-spacing:2px}
.ref-code button{padding:12px 16px;background:var(--amber);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:800;cursor:pointer;box-shadow:var(--n-shadow-sm);font-family:inherit}

/* Menu */
.pmenu{padding:0 16px}
.pmi{display:flex;align-items:center;gap:13px;background:var(--bg);border-radius:var(--r-md);padding:15px 14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--n-shadow);border:1px solid rgba(255,255,255,.4);transition:all .2s}
.pmi:active{box-shadow:var(--n-shadow-in);transform:scale(0.98)}
.pmi-ic{width:38px;height:38px;border-radius:12px;background:var(--lightblue);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--n-shadow-sm)}
.pmi-ic svg{width:18px;height:18px;stroke:var(--b5);fill:none;stroke-width:2}
.pmi-txt{flex:1;font-size:13px;font-weight:700;color:var(--txt)}
.pmi-badge{font-size:12px;color:var(--b5);font-weight:800}
.pmi-ch svg{width:15px;height:15px;stroke:var(--txt3);fill:none;stroke-width:2}

/* Admin Button */
.admin-btn{margin:4px 16px 10px;background:linear-gradient(135deg,var(--txt),var(--txt2));color:#fff;border:none;border-radius:var(--r-md);padding:15px;width:calc(100% - 32px);display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:var(--n-shadow);font-family:inherit}
.admin-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}

.logout-btn{margin:4px 16px 20px;border:2px solid var(--red);background:var(--bg);border-radius:var(--r-md);padding:15px;width:calc(100% - 32px);display:flex;align-items:center;justify-content:center;gap:10px;color:var(--red);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:var(--n-shadow)}
</style>
</head>
